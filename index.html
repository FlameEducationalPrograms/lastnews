<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Latest News</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #fff8ee;
      color: #2d241c;
    }

    .page {
      max-width: 1100px;
      margin: auto;
      padding: 35px 18px;
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .cross {
      font-size: 36px;
      color: #9b642e;
      margin-bottom: 8px;
    }

    .label {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a9743e;
      font-weight: 700;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      color: #5a3217;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 18px;
      color: #7c6b59;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #efdcc4;
      box-shadow: 0 8px 24px rgba(90, 50, 23, 0.12);
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 32px rgba(90, 50, 23, 0.18);
    }

    .image-box {
      height: 230px;
      background: #f4e5d1;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      padding: 18px 20px 22px;
    }

    .date {
      display: inline-block;
      background: #fff0d9;
      color: #8b5725;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 13px;
    }

    .description {
      font-size: 17px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .loading,
    .empty,
    .error {
      text-align: center;
      background: #ffffff;
      border-radius: 20px;
      padding: 35px 20px;
      color: #7c6b59;
      font-size: 18px;
      border: 1px dashed #d8ba95;
      grid-column: 1 / -1;
    }

    .error {
      color: #9b2f2f;
      border-color: #e0a0a0;
      background: #fff4f4;
    }

    .footer {
      text-align: center;
      margin-top: 35px;
      color: #9a8065;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .news-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 25px 12px;
      }

      h1 {
        font-size: 34px;
      }

      .subtitle {
        font-size: 16px;
      }

      .news-grid {
        grid-template-columns: 1fr;
      }

      .image-box {
        height: 240px;
      }

      .description {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <div class="cross">✝</div>
      <div class="label">Church Service Updates</div>
      <h1>Latest News</h1>
      <div class="subtitle">Latest moments, activities, and service updates</div>
    </div>

    <div id="newsContainer" class="news-grid">
      <div class="loading">Loading latest news...</div>
    </div>

    <div class="footer">
      Updated automatically from AppSheet
    </div>
  </div>

  <script>
    const PUBLISHED_SHEET_ID = "2PACX-1vR7OE6IrI6mRhSuWFmEQel_cjsrZefWBRJpGMESvFt7ivgyIjvmMwu3vAsEzALqNUrPm5Ve4jczbSSu";
    const SHEET_GID = "1863532918";
    const MAX_ITEMS = 10;

    let sheetLoaded = false;

    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};

    window.google.visualization.Query.setResponse = function(response) {
      sheetLoaded = true;

      try {
        handleGoogleSheetResponse(response);
      } catch (error) {
        showError("Error while processing sheet data: " + error.message);
      }
    };

    function loadNewsFromGoogleSheet() {
      const oldScript = document.getElementById("googleSheetScript");

      if (oldScript) {
        oldScript.remove();
      }

      const script = document.createElement("script");
      script.id = "googleSheetScript";

      script.src =
        "https://docs.google.com/spreadsheets/d/e/" +
        PUBLISHED_SHEET_ID +
        "/gviz/tq?tqx=out:json&gid=" +
        SHEET_GID +
        "&headers=1&cachebust=" +
        new Date().getTime();

      script.onerror = function() {
        showError("Could not load the published Google Sheet. Please check that the sheet is published to the web.");
      };

      document.body.appendChild(script);

      setTimeout(function() {
        if (!sheetLoaded) {
          showError("The Google Sheet did not respond. Please check the published sheet link and column names.");
        }
      }, 10000);
    }

    function handleGoogleSheetResponse(response) {
      if (!response || !response.table) {
        showError("Invalid response from Google Sheet.");
        return;
      }

      const cols = response.table.cols.map(col => (col.label || "").trim());
      const rows = response.table.rows || [];

      const dateIndex = cols.indexOf("News Date");
      const imageIndex = cols.indexOf("PublicImageURL");
      const descIndex = cols.indexOf("Description");
      const showIndex = cols.indexOf("ShowOnWebsite");

      if (dateIndex === -1 || imageIndex === -1 || descIndex === -1 || showIndex === -1) {
        showError(
          "Column names are not correct. Required columns: News Date, PublicImageURL, Description, ShowOnWebsite"
        );
        return;
      }

      const newsItems = rows
        .map(row => {
          const cells = row.c || [];

          const rawDateCell = cells[dateIndex];
          const rawImageCell = cells[imageIndex];
          const rawDescCell = cells[descIndex];
          const rawShowCell = cells[showIndex];

          const rawDate = getCellValue(rawDateCell);
          const formattedDate = getCellFormattedValue(rawDateCell) || formatDateValue(rawDate);
          const image = getCellValue(rawImageCell);
          const description = getCellValue(rawDescCell);
          const show = getCellValue(rawShowCell);

          return {
            date: formattedDate,
            dateSortValue: getDateSortValue(rawDate),
            image: image || "",
            description: description || "",
            show: show
          };
        })
        .filter(item => isVisible(item.show))
        .sort((a, b) => b.dateSortValue - a.dateSortValue)
        .slice(0, MAX_ITEMS);

      renderNews(newsItems);
    }

    function renderNews(newsItems) {
      const container = document.getElementById("newsContainer");

      if (!Array.isArray(newsItems) || newsItems.length === 0) {
        container.innerHTML = `
          <div class="empty">
            No news is available at the moment.
          </div>
        `;
        return;
      }

      container.innerHTML = newsItems.map(item => {
        const image = item.image || "";
        const date = item.date || "";
        const description = escapeHtml(item.description || "");

        return `
          <div class="card">
            <div class="image-box">
              ${image ? `<img src="${addCacheBuster(image)}" alt="News image">` : ""}
            </div>

            <div class="content">
              <div class="date">${escapeHtml(date)}</div>
              <div class="description">${description}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function getCellValue(cell) {
      if (!cell || cell.v === null || cell.v === undefined) {
        return "";
      }

      return cell.v;
    }

    function getCellFormattedValue(cell) {
      if (!cell || cell.f === null || cell.f === undefined) {
        return "";
      }

      return cell.f;
    }

    function isVisible(value) {
      if (value === true) {
        return true;
      }

      const text = value.toString().trim().toLowerCase();

      return text === "true" || text === "yes" || text === "1";
    }

    function formatDateValue(value) {
      if (!value) {
        return "";
      }

      if (typeof value === "string" && value.startsWith("Date(")) {
        const date = parseGoogleDate(value);

        if (date) {
          return formatDate(date);
        }
      }

      const parsedDate = new Date(value);

      if (!isNaN(parsedDate.getTime())) {
        return formatDate(parsedDate);
      }

      return value.toString();
    }

    function getDateSortValue(value) {
      if (!value) {
        return 0;
      }

      if (typeof value === "string" && value.startsWith("Date(")) {
        const date = parseGoogleDate(value);
        return date ? date.getTime() : 0;
      }

      const parsedDate = new Date(value);

      return isNaN(parsedDate.getTime()) ? 0 : parsedDate.getTime();
    }

    function parseGoogleDate(value) {
      const match = value.match(/Date\((\d+),(\d+),(\d+)\)/);

      if (!match) {
        return null;
      }

      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);

      return new Date(year, month, day);
    }

    function formatDate(date) {
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const year = date.getFullYear();

      return day + "/" + month + "/" + year;
    }

    function escapeHtml(text) {
      return text
        .toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function addCacheBuster(url) {
      if (!url) return "";

      const separator = url.includes("?") ? "&" : "?";
      return url + separator + "v=" + new Date().getTime();
    }

    function showError(message) {
      const container = document.getElementById("newsContainer");

      container.innerHTML = `
        <div class="error">
          ${escapeHtml(message)}
        </div>
      `;
    }

    loadNewsFromGoogleSheet();
  </script>
</body>
</html>
